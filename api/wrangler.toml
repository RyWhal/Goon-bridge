name = "vibe-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[version_metadata]
binding = "CF_VERSION_METADATA"

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ── Variables ─────────────────────────────────────────────────────────────────
# Secrets (CONGRESS_API_KEY, OPENFEC_API_KEY, SUPABASE_SERVICE_KEY) are set
# as encrypted secrets in the Cloudflare dashboard under
# Workers → vibe-api → Settings → Variables and Secrets.
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://congressional-vibes.rjpw.space,http://localhost:5175,http://localhost:5173"
SUPABASE_URL = "https://phorzmybynuuxbvcioqg.supabase.co"

# Uncomment when custom domain is configured in Cloudflare DNS:
# [[routes]]
# pattern = "congressional-vibes.rjpw.space/api/*"
# zone_name = "rjpw.space"
